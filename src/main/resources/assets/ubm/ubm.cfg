# These options affect block rates and growth rates.
# They are used to configure the growth rates of plants and the rates of block changes.
blocks {
    D:copperOxidationRate=0.25 # The rate at which copper blocks oxidize.
    D:pointedDripstoneGrowthRate=0.1 # The rate at which pointed dripstone grows.
    D:pointedDripstoneCauldronFillRate=0.1 # The rate at which pointed dripstone fills cauldrons with water or lava.
    D:glowBerriesGrowthRate=0.1 # The rate at which glow berries grow.
    D:sweetBerriesGrowthRate=0.1 # The rate at which sweet berries grow.
    D:frogSpawnGrowthRate=0.1 # The rate at which frog spawn grows.
}

# These options affect the trading system and villager mechanics.
trading {
    B:replaceVanillaVillagers=true # Toggle whether the vanilla villagers are replaced by the new trading system or not.
    B:replaceVillagerTextures=true # Toggle whether the villager textures are replaced by the new textures or not.
    B:replaceVillagerModels=true # Toggle whether the villager models are replaced by the new models or not.
    B:replaceTrading=true # Toggle whether the trading system is replaced by the a trading system (defined below) or not.
    # This is the trading system used by UBM.
    # 1 = Vanilla Trading System like in 1.14
    # 2 = Trading System like in 1.21 (biome-dependent trades)
    I:tradingSystem=1
    D:tradingRestockTime=1200.0 # The time in seconds it takes for a villager to restock its trades.
    # The number of trades a villager can do before it needs to restock. It is determined by a randomizer
    I:tradingMaxTrades=12
    I:tradingMinTrades=8
}

# These options affect vanilla mechanics and features.
vanilla {
    B:enableNewSheepColorByBiome=true # Toggle whether the sheep color is determined by the biome or not.
    B:replaceEntityTexturesWolf=true # Toggle whether the wolf textures are replaced by the new textures or not.
    B:replaceEntityTexturesPig=true # Toggle whether the pig textures are replaced by the new textures or not.
    B:replaceEntityTexturesCow=true # Toggle whether the cow textures are replaced by the new textures or not.
    B:replaceEntityTexturesChicken=true # Toggle whether the chicken textures are replaced by the new textures or not.
    B:replaceEntityTexturesSpider=true # Toggle whether the spider texture is replaced by the new texture or not.
    B:replaceModelVex=true # Toggle whether the vex model is replaced by the new model or not.
    B:replaceModelBat=true # Toggle whether the bat model is replaced by the new model or not.

    B:enableItemsFloatOnWater=true # Toggle whether items float on water or not. This is the behavior introduced in 1.13.
    # By default, the air after going out of water is instant in 1.12.2. This option patches it to the behavior invented in 1.13.
    B:disableInstantAirOutsideWater=true

    # In 1.12.2, you repaired your elytra using leather. That changed with the 1.14 update and phantom membranes.
    B:replaceElytraRepairing=true
    B:undyeShulkerBoxesWithCauldron=true # Toggle whether shulker boxes can be undyed with cauldrons or not.

    B:enableWaterLogging=true # Toggle whether water logging is enabled or not. This is the behavior introduced in 1.13.
    B:enableCrawling=true # Toggle whether crawling is enabled or not. This is the behavior introduced in 1.14.
    B:smoothSneaking=true # Toggle whether sneaking is smooth or not. This is the behavior introduced in 1.13.

    B:replacePumpkinTexture=true # Toggle whether the pumpkin texture is replaced by the new texture or not.
    B:squidDropInk=true # Toggle whether squids drop ink sacs or not. This is the behavior introduced in 1.13.

    B:replaceOreDrops=true # Toggle whether the ore drops are replaced by the new drops (raw ores) or not.

    B:replaceSigns=true # Toggle whether the signs are replaced by the new sign system (editing, colors, ...) or not.

    B:saddlesCraftable=true # Toggle whether saddles are craftable or not. This is the behavior introduced in 1.21.

    B:enableStrippingWood=true # Toggle whether stripping wood is enabled or not. This is the behavior introduced in 1.14.
    # Toggle wether old "wood" should be replaced with logs or not.
    # Wood has it's own block with all sides being the same.
    # This is the behavior introduced in 1.14.
    B:replaceWoodWithLog=true

    B:addSuspiciousSandToVanillaStructures=true # Toggle whether suspicious sand is added to vanilla structures or not.
    B:addSuspiciousGravelToVanillaStructures=true # Toggle whether suspicious gravel is added to vanilla structures or not.

    # Toggle whether dirt can convert to mud when it's being clicked with water bottles or not.
    # This is the behavior introduced in 1.21.
