# Ultimate Backport Configuration
# Do not change this
I:configVersion=1


# This defines which features will be activated by default.
# You have to choice between these levels:
# RELEASE - Fully tested features
# BETA - Features that may include bugs
# DEVELOPMENT - Features that are in the works
S:featureLevel=DEVELOPMENT

# Change these values to configure entities added by UBM
# These values exist for entities:
# - enabled: Whether the entity is enabled or not.
# - health: The health of the entity (in half hearts).
# - damage: The damage the entity deals (in half hearts).
# - spawnWeight: The weight of the entity when spawning.
# - feedItems: The items the entity can be fed with.
# - spawnNaturally: Whether the entity spawns naturally or not.
# - spawnBiomes: The biomes the entity can spawn in.
# Some entities have additional options, which are documented below.

# Allays are passive mobs spawning in pillager outposts.
# If you give them an item, they will pick up all items of that type in a certain radius and bring them to you.
entities.allay {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
    B:bringItemsToPlayer=true # Toggle whether the allay brings items to the player or not.
    I:itemRadius=16 # The radius in which the allay picks up items.
}

# The armadillo is a passive mob that spawns in deserts and savanna.
# When using a brush on it, it will drop a scute, which can be used to craft wolf armor.
# The armadillo rolls to a ball when attacked, making it harder to hit.
entities.armadillo {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
}

# Axolotls are passive mobs that spawn in water.
# They can be fed with tropical fish buckets and will attack tropical fish in water.
# They can also be bucketed and can play dead when attacked.
# You can team up with them to fight underwater mobs like guardians.
entities.axolotl {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    S:feedItems <
        ubm:bucket_tropical_fish
    >
    B:bucketInteraction=true # Toggle whether the axolotl can be bucketed or not.
    B:canPlayDead=true # Toggle whether the axolotl can play dead or not
    B:attackTropicalFish=true # Toggle whether the axolotl attacks tropical fish or not.
    B:attackGuardians=true
    B:attackTadpoles=true
}


# The bee spawns in almost every warm biome.
# It can be fed with flowers and will pollinate them around.
# After pollinating it flies to it's nest and produces honey there.
entities.bee {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    I:nestSearchRadius=32 # The radius in which the bee searches for a nest.
    I:pollinationRange=32 # The range in which the bee can pollinate flowers.
    S:feedItems <
        minecraft:red_flower
    >
}

# The bogged is a hostile mob that spawns in swamps.
# It also spawns in trial chambers.
# It shoots tipped arrows with poison.
entities.bogged {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
}

# The breeze is a hostile mob that spawns in trial chambers.
entities.breeze {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
}

# The camel is a passive mob that spawns in deserts and savannas.
# It can be ridden by two players and has a special jump ability.
# The camel can also be fed with hay balls and will heal itself.
entities.camel {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
    D:jumpStrength=1.0
}

# The cat is a passive mob that spawns in villages.
# It can be fed with fish and will bring gifts to the player after sleeping.
# The cat can also sit on chests and beds.
entities.cat {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
    B:canSitOnChests=true # Toggle whether the cat can sit on chests or not.
    B:canSitOnBeds=true # Toggle whether the cat can sit on beds or not.
    B:bringGifts=true # Toggle whether the cat brings gifts or not. The loot table "cat" is used here.
    B:replaceOcelot=true # Toggle whether the ocelot is replaced by the cat or not.
    B:takeFallDamage=false # Toggle whether the cat takes fall damage or not.
    S:feedItems <
        minecraft:fish
    >
}

# The cod is a passive animal spawning in rivers and oceans.
# They can be catched with a bucket and drop bone meal and raw cod when killed.
entities.cod {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
}

# The copper golem that can be spawned by using copper blocks and a pumpkin.
# It sort items in chests and oxidizes over time.
entities.coppergolem {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
    I:chestRadius=16 # The radius in which the copper golem sorts items in chests.
    I:oxidationTime=6000 # The time in ticks it takes for the copper golem to oxidize.
}

# The creaking is a hostile mob that spawns in pale gardens.
# It only spawns at night and will attack players if they are not looking at it.
# If you look at it, it will stop moving and will not attack you.
# It has a creaking heart in a tree and will attack players if they get too close to it.
entities.creaking {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
}

# The dolphin is a neutral mob that spawns in cold oceans.
# It can be fed with fish and will lead players to shipwrecks and ocean ruins.
# It can also be used to travel faster in water.
entities.dolphin {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    S:feedItems <
        minecraft:fish
    >
}

# The drowned is a neutral mob that spawns in oceans and rivers.
# It can hold a trident, a fishing rod or a nautilus shell.
# Zombies convert into drowned when they drown in water.
entities.drowned {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    B:convertZombie=true # Toggle whether the zombie can convert to a drowned under water or not.
    D:rodChance=0.05 # The chance of the drowned holding a fishing rod.
    D:tridentChance=0.05 # The chance of the drowned holding a trident.
    D:nautilusShellChance=0.05 # The chance of the drowned holding a nautilus shell.
    D:tridentDropChance=0.05 # The chance of the drowned dropping a trident when killed.
    D:rodDropChance=0.05 # The chance of the drowned dropping a fishing rod when killed.
    D:nautilusShellDropChance=0.05 # The chance of the drowned dropping a nautilus shell when killed.
}

# Foxes spawn in taiga biomes and are neutral mobs.
# They can be fed with sweet berries and will pick up items.
# They attack chickens and can jump over fences.
# Holding a totem of undying in their mouth will make them use it when they take fatal damage.
entities.fox {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    S:feedItems <
        ubm:sweet_berries
    >
    B:canPickupAnyItem=true # Toggle whether the fox can pick up any item or not.
    B:canUseTotems=true # Toggle whether the fox can use totems of undying or not.
}

# Frogs are passive mobs that spawn in swamps and mangrove swamps.
# They can be fed with slime balls and will eat slimes and magma cubes.
# They can also be used to create frog spawn blocks, which will hatch into tadpoles.
# The frog can jump and has a special jump strength.
# Eating a slime will drop slime balls, eating a magma cube will drop frog lights.
# The color of the frog depends on the biome temperature it spawns in.
# The dropped froglight also depends on the frog's color.
entities.frog {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    D:jumpStrength=1.0 # The jump strength of the frog.
    S:feedItems <
        minecraft:slime_ball
    >
    B:eatSlime=true # Toggle whether the frog eats slimes or not.
    B:eatMagmaCube=true # Toggle whether the frog eats magma cubes or not.
    I:slimeDropAmount=4 # The amount of slime balls the frog drops when it eats a slime.
}

# The glow squid is a passive mob that spawns in oceans, rivers and caves.
# It drops glowing ink sacs when killed.
# It can also be used to create glowing item frames and glowing signs.
entities.glowsquid {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
}

# The goat is a neutral mob that spawns in mountains.
# It can be fed with wheat and will drop goat horns when it rams a block.
# Goats have a small chance to be screaming goats, which have a different sound and behavior.
# Screaming goats are more aggressive and will ram players more often.
# The goat can also jump and has a special jump strength.
entities.goat {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    D:jumpStrength=1.0 # The jump strength of the goat.
    D:hornDropChance=0.5 # The chance of the goat dropping a horn when it rams a block.
    D:screamingChance=0.1 # The chance of the goat being a screaming goat.
}

# Happy Ghasts are passive mobs that can be spawned with dried ghasts found in soul sand valleys.
# Up to 4 players can ride them. Happy ghasts are being spawned by placing a dried ghast in the overworld in water.
# After waiting a while, the dried ghast block turns into a ghastling, which can be fed with snow balls.
# After a while, the ghastling turns into a happy ghast, which can be ridden by players.
entities.happy_ghast {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
}

# The hoglin is a hostile mob that spawns in the nether.
# It attacks every player in their sight. Hoglins flee from warped fungus and panic when they see a nether portal.
# They drop porkchops when killed.
entities.hoglin {
    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
