# They have different personalities, which affect their behavior.
entities.panda {
    B:enabled=true
    I:health=10
    I:spawnWeight=10
    S:feedItems <
        ubm:bamboo
    >
    B:eatBamboo=true # Toggle whether the panda eats bamboo or not.
}

# The phantom is a hostile undead creature that spawns at night if the player has not slept for a certain amount of days.
