    # enchanting table, rather than only through an anvil. This behavior was introduced in 1.21.
    B:axeEnchantmentFix=true
}


# These options affect the enchantments added by UBM.
# They are used to configure the enchantments and their costs.
# There are these values defined for each enchantment:
# - enable: Whether the enchantment is enabled or not.
# - maxLevel: The maximum level of the enchantment.
# - baseCost: The base cost of the enchantment.
# - costPerLevel: The cost per level of the enchantment.
# - multiplier: The multiplier of the enchantment.

# The swift sneak enchantment allows players to sneak faster.
# It can be applied to leggings and has a maximum level of 3.
# It can be found in ancient cities.
enchantments.swift_sneak {
    B:enabled=true
    I:maxLevel=3
    I:baseCost=10
    I:costPerLevel=5
    I:multiplier=1.0
    B:onBoots=false # Toggle whether the enchantment can be applied to boots or not. By default, it can only be applied to leggings.
}

