    B:panicWarpedFungus=true # Toggle whether the hoglin panics when it sees warped fungus or not.
    I:warpedFungusPanicRange=16 # The range in which the hoglin panics when it sees warped fungus.
}

# Pandas are neutral mobs that spawn in bamboo jungles.
# They can be fed with bamboo and will eat it.
