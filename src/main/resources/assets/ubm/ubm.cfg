    B:enabled=true
    I:health=10
    I:damage=3
    I:spawnWeight=10
    B:canPickUpItems=true # Toggle whether the piglin can pick up items or not.
    B:trading=true # Toggle whether the piglin can trade with the player or not (loot table "piglin_bartering").
    B:canUseGold=true # Toggle whether the piglin can use gold items or not
